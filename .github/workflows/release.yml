name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: softprops/action-gh-release@v2
        with:
          name: "Nexum ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1+) — native ARM runner
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # Intel — native x86_64 runner
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: ""
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install macOS Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexum ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew:
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS DMGs and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          gh release download "v${VERSION}" \
            --repo Snenjih/nexum \
            --pattern "Nexum_${VERSION}_aarch64.dmg" \
            --dir /tmp/
          SHA256_AARCH64=$(sha256sum /tmp/Nexum_${VERSION}_aarch64.dmg | cut -d' ' -f1)
          echo "SHA256_AARCH64=$SHA256_AARCH64" >> $GITHUB_OUTPUT

          gh release download "v${VERSION}" \
            --repo Snenjih/nexum \
            --pattern "Nexum_${VERSION}_x64.dmg" \
            --dir /tmp/
          SHA256_X86_64=$(sha256sum /tmp/Nexum_${VERSION}_x64.dmg | cut -d' ' -f1)
          echo "SHA256_X86_64=$SHA256_X86_64" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: Snenjih/homebrew-nexum
          event-type: nexum-release
          client-payload: >-
            {"version": "${{ steps.version.outputs.VERSION }}",
             "sha256_aarch64": "${{ steps.sha.outputs.SHA256_AARCH64 }}",
             "sha256_x86_64": "${{ steps.sha.outputs.SHA256_X86_64 }}"}
