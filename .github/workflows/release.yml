name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -E '^feat' | sed 's/^feat[^:]*: //')
          FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E '^fix' | sed 's/^fix[^:]*: //')
          OTHERS=$(git log "$RANGE" --pretty=format:"%s" | grep -vE '^(feat|fix|chore|ci|docs|style|test|build|refactor)' )

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
              echo ""
            fi

            echo "---"
            echo "_See the assets below to download and install. Auto-update is built in._"
          } > CHANGELOG_BODY.md

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexum ${{ github.ref_name }}"
          releaseBodyPath: CHANGELOG_BODY.md
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
