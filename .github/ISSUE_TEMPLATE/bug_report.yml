name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below — it makes triage much faster.

        For **security issues**, do NOT open an issue. See [SECURITY.md](https://github.com/Snenjih/Nexum/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: Nexum version
      description: From Settings → About, or the title bar.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11 24H2"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the app does this bug relate to?
      options:
        - SSH terminal
        - SFTP file manager
        - Host & credential management
        - Local terminal
        - File explorer
        - Editor
        - AI assistant
        - Transfer queue
        - Command palette
        - General UI / other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list of exact steps. The more specific, the faster we can help.
      placeholder: |
        1. Open Nexum
        2. Connect to an SSH host
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: |
        If applicable, paste relevant logs or attach screenshots / screen recordings.
        Launch Nexum from a terminal to see stderr output, or open the DevTools console (macOS: ⌘⌥I).

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I am running the latest version (or this happens on `main`)
          required: false
